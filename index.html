<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>who?</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="rain"></div>
    <div class="background-overlay"></div>
    <div class="container">
        <div class="profile-container">
            <img src="lol.jpg" alt="Profile Picture" class="profile-picture">
            <div class="profile-info">
                <span class="username"> y? </span>
                <span class="timestamp"> Jan 13,  1879</span>
            </div>
        </div>
        <h1 class="title">-</h1>
        <p class="tweet-content"> </p>
        <div class="social-card">
            <ul class="social-links">
                <li><a href="https://www.instagram.com/rhythmcache/" target="_blank" class="social-button instagram"><i class="fab fa-instagram"></i> Instagram</a></li>
                <li><a href="https://rhythmcache.t.me" target="_blank" class="social-button telegram"><i class="fab fa-telegram"></i> Telegram</a></li>
                <li><a href="https://github.com/rhythmcache" target="_blank" class="social-button github"><i class="fab fa-github"></i> GitHub</a></li>
            </ul>
        </div>
    </div>

    <script>
        const rainContainer = document.querySelector('.rain');
        const numberOfDrops = 75;

        for (let i = 0; i < numberOfDrops; i++) {
            const drop = document.createElement('div');
            drop.classList.add('drop');
            drop.style.left = `${Math.random() * 100}%`;
            drop.style.animationDuration = `${Math.random() * 1 + 0.5}s`;
            drop.style.animationDelay = `${Math.random() * 2}s`;
            rainContainer.appendChild(drop);
        }
    </script>
</body>
</html>
